collection:
  interval: 2h
# Optional OTLP/gRPC push export. Omit or leave endpoint empty to run Prometheus-only.
otlp:
  endpoint: ""      # e.g. otel-collector:4317
  insecure: false   # true to disable TLS (in-cluster collectors)
collectors:
  m365:
    enabled: true
    tenants:
      - instance: tenant-a
        tenantId: ${M365_TENANT_ID}
        clientId: ${M365_CLIENT_ID}
        clientSecret: ${M365_CLIENT_SECRET}
  vmware:
    enabled: true
    vcenters:
      - instance: vcsa01
        host: ${VCENTER_HOST}
        username: ${VCENTER_USER}
        password: ${VCENTER_PASSWORD}
        insecureSkipVerify: false
